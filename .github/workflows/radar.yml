name: Radar Pabrik Cuanderland

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  scan-saham-idx:
    runs-on: ubuntu-latest
    steps:
      - name: Tarik Blueprint dari Repo
        uses: actions/checkout@v3
        
      - name: Siapkan Mesin Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Material (Supabase, Pandas, YFinance, Requests)
        run: |
          pip install supabase yfinance pandas requests
          
      - name: Nyalakan Mesin Pabrik!
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python mesin_pabrik.py